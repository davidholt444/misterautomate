<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vlog | David Holt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Video updates from David Holt on automation, AI systems, and product development." />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="icon" href="../icon_square.ico" type="image/x-icon" />
  <style>
    :root {
      --bg: #edf1f4;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: #ffffff;
      --ink: #13232d;
      --muted: #5a6a74;
      --line: rgba(19, 35, 45, 0.12);
      --accent: #8b5e3c;
      --accent-soft: rgba(139, 94, 60, 0.12);
      --deep: #1d3442;
      --shadow: 0 24px 70px rgba(19, 35, 45, 0.12);
      --radius-xl: 34px;
      --radius-lg: 22px;
      --radius-sm: 14px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      line-height: 1.65;
      background:
        radial-gradient(circle at top left, rgba(139, 94, 60, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(29, 52, 66, 0.12), transparent 30%),
        linear-gradient(180deg, #f6f8fa 0%, var(--bg) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      z-index: -1;
      border-radius: 50%;
      filter: blur(6px);
      opacity: 0.9;
    }

    body::before {
      width: 380px;
      height: 380px;
      top: -140px;
      right: -120px;
      background: radial-gradient(circle at 35% 35%, rgba(139, 94, 60, 0.18), transparent 68%);
    }

    body::after {
      width: 420px;
      height: 420px;
      left: -160px;
      bottom: -180px;
      background: radial-gradient(circle at 50% 50%, rgba(29, 52, 66, 0.14), transparent 72%);
    }

    a { color: inherit; text-decoration: none; }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 24px 96px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 8px 0 32px;
    }

    .brand {
      display: block;
      min-width: 220px;
      min-height: 1px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: flex-end;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav a,
    .nav summary {
      padding-bottom: 4px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      list-style: none;
    }

    .nav a:hover,
    .nav summary:hover,
    .nav details[open] summary {
      color: var(--ink);
      border-color: var(--accent);
    }

    .nav a.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    .nav summary::-webkit-details-marker { display: none; }

    .nav details { position: relative; }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      min-width: 220px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(19, 35, 45, 0.14);
      display: grid;
      gap: 4px;
      z-index: 10;
    }

    .dropdown-menu a {
      padding: 10px 12px;
      border-radius: 10px;
      border-bottom: 0;
    }

    .dropdown-menu a:hover { background: rgba(19, 35, 45, 0.05); }

    h1, h2, h3 {
      font-family: "Fraunces", "Georgia", serif;
      letter-spacing: 0.01em;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .page-hero {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-xl);
      padding: 48px;
      display: grid;
      gap: 12px;
      animation: fadeUp 0.8s ease-out both;
    }

    .page-hero h1 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      line-height: 1;
    }

    .page-hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 58ch;
    }

    .section {
      margin-top: 56px;
      animation: fadeUp 0.8s ease-out both;
    }

    /* Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* Thumbnail card */
    .thumb-card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(19, 35, 45, 0.08);
    }

    .thumb-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(19, 35, 45, 0.16);
    }

    .thumb-img-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: var(--deep);
      overflow: hidden;
    }

    .thumb-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .thumb-card:hover .thumb-img-wrap img {
      transform: scale(1.04);
    }

    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(19, 35, 45, 0.28);
      transition: background 0.2s ease;
    }

    .thumb-card:hover .play-btn {
      background: rgba(19, 35, 45, 0.18);
    }

    .play-btn svg {
      width: 52px;
      height: 52px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
      transition: transform 0.2s ease;
    }

    .thumb-card:hover .play-btn svg {
      transform: scale(1.1);
    }

    .thumb-meta {
      padding: 14px 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .thumb-ep {
      font-family: "Fraunces", "Georgia", serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink);
    }

    .thumb-date {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
    }

    /* Empty state */
    .empty-state {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 48px 32px;
      text-align: center;
      color: var(--muted);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(13, 22, 28, 0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      position: relative;
      width: 100%;
      max-width: 900px;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.25s ease;
    }

    .modal-overlay.open .modal-box {
      transform: translateY(0) scale(1);
    }

    .modal-video {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    .modal-video iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .modal-close {
      position: absolute;
      top: -44px;
      right: 0;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: background 0.2s ease;
    }

    .modal-close:hover { background: rgba(255,255,255,0.22); }

    .modal-close svg { width: 16px; height: 16px; }

    /* Animations */
    .fade-delay-1 { animation-delay: 0.08s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }

    @media (max-width: 900px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 720px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        justify-content: flex-start;
        gap: 12px;
      }

      .dropdown-menu {
        position: static;
        margin-top: 8px;
        min-width: 0;
      }

      .page { padding-inline: 18px; }

      .page-hero { padding: 24px; }

      .video-grid { grid-template-columns: 1fr; gap: 14px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="brand" href="../" aria-label="Home"></a>
      <nav class="nav">
        <a href="../#experience">Experience</a>
        <details>
          <summary>Projects</summary>
          <div class="dropdown-menu">
            <a href="../compass/">Compass</a>
            <a href="../linkedin/">LinkedIn Feed Filter</a>
          </div>
        </details>
        <a href="../vlog/" class="active">Vlog</a>
        <a href="https://www.linkedin.com/in/david-h-27397413a/">Contact</a>
      </nav>
    </header>

    <main>
      <div class="page-hero">
        <p class="eyebrow">Video updates</p>
        <h1>Vlog</h1>
        <p>Building in public — automation systems, AI tools, and product development as it happens.</p>
      </div>

      <section class="section fade-delay-1" id="posts">
        <div id="posts-container"></div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/>
        </svg>
      </button>
      <div class="modal-video" id="modal-video"></div>
    </div>
  </div>

  <script>
    function getVideoId(embedHtml) {
      const match = embedHtml.match(/youtube\.com\/embed\/([A-Za-z0-9_-]+)/);
      return match ? match[1] : null;
    }

    function thumbUrl(videoId) {
      return `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    }

    function buildEmbed(embedHtml) {
      return embedHtml
        .replace(/width="\d+"/, 'width="100%"')
        .replace(/height="\d+"/, 'height="100%"')
        .replace('src="//', 'src="https://') // ensure https
        .replace('src="https://www.youtube.com/embed/', 'src="https://www.youtube.com/embed/')
        .replace(/"(https:\/\/www\.youtube\.com\/embed\/[A-Za-z0-9_-]+)"/, (_, url) => `"${url}?autoplay=1"`);
    }

    // Modal logic
    const modal = document.getElementById('modal');
    const modalVideo = document.getElementById('modal-video');

    function openModal(embedHtml) {
      modalVideo.innerHTML = buildEmbed(embedHtml);
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      // Destroy iframe to stop video
      setTimeout(() => { modalVideo.innerHTML = ''; }, 250);
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);

    modal.addEventListener('click', e => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // Load posts
    fetch('posts.json')
      .then(r => r.json())
      .then(posts => {
        const container = document.getElementById('posts-container');

        if (!posts.length) {
          container.innerHTML = '<div class="empty-state">No posts yet. Check back soon.</div>';
          return;
        }

        const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));

        const cards = sorted.map((post, i) => {
          const videoId = getVideoId(post.embedHtml);
          const date = new Date(post.date + 'T00:00:00');
          const label = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          const ep = sorted.length - i;
          const embedEscaped = post.embedHtml.replace(/"/g, '&quot;');

          return `
            <article class="thumb-card" role="button" tabindex="0" data-embed="${embedEscaped}" aria-label="Play episode ${ep}">
              <div class="thumb-img-wrap">
                <img src="${thumbUrl(videoId)}" alt="Episode ${ep} thumbnail" loading="lazy" />
                <div class="play-btn" aria-hidden="true">
                  <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="26" cy="26" r="26" fill="rgba(255,255,255,0.18)"/>
                    <polygon points="21,17 38,26 21,35" fill="white"/>
                  </svg>
                </div>
              </div>
              <div class="thumb-meta">
                <span class="thumb-ep">Ep. ${ep}</span>
                <span class="thumb-date">${label}</span>
              </div>
            </article>
          `;
        }).join('');

        container.innerHTML = `<div class="video-grid">${cards}</div>`;

        // Attach click handlers
        container.querySelectorAll('.thumb-card').forEach(card => {
          const open = () => openModal(card.dataset.embed.replace(/&quot;/g, '"'));
          card.addEventListener('click', open);
          card.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
          });
        });
      })
      .catch(() => {
        document.getElementById('posts-container').innerHTML =
          '<div class="empty-state">Could not load posts.</div>';
      });
  </script>
</body>
</html>
