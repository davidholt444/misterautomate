<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vlog | David Holt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Video updates from David Holt on automation, AI systems, and product development." />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="icon" href="../icon_square.ico" type="image/x-icon" />
  <style>
    :root {
      --bg: #edf1f4;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: #ffffff;
      --ink: #13232d;
      --muted: #5a6a74;
      --line: rgba(19, 35, 45, 0.12);
      --accent: #8b5e3c;
      --accent-soft: rgba(139, 94, 60, 0.12);
      --deep: #1d3442;
      --shadow: 0 24px 70px rgba(19, 35, 45, 0.12);
      --radius-xl: 34px;
      --radius-lg: 22px;
      --radius-sm: 14px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      line-height: 1.65;
      background:
        radial-gradient(circle at top left, rgba(139, 94, 60, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(29, 52, 66, 0.12), transparent 30%),
        linear-gradient(180deg, #f6f8fa 0%, var(--bg) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      z-index: -1;
      border-radius: 50%;
      filter: blur(6px);
      opacity: 0.9;
    }

    body::before {
      width: 380px;
      height: 380px;
      top: -140px;
      right: -120px;
      background: radial-gradient(circle at 35% 35%, rgba(139, 94, 60, 0.18), transparent 68%);
    }

    body::after {
      width: 420px;
      height: 420px;
      left: -160px;
      bottom: -180px;
      background: radial-gradient(circle at 50% 50%, rgba(29, 52, 66, 0.14), transparent 72%);
    }

    a { color: inherit; text-decoration: none; }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 24px 96px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 8px 0 32px;
    }

    .brand {
      display: block;
      min-width: 220px;
      min-height: 1px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: flex-end;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav a,
    .nav summary {
      padding-bottom: 4px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      list-style: none;
    }

    .nav a:hover,
    .nav summary:hover,
    .nav details[open] summary {
      color: var(--ink);
      border-color: var(--accent);
    }

    .nav a.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    .nav summary::-webkit-details-marker { display: none; }

    .nav details { position: relative; }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      min-width: 220px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(19, 35, 45, 0.14);
      display: grid;
      gap: 4px;
      z-index: 10;
    }

    .dropdown-menu a {
      padding: 10px 12px;
      border-radius: 10px;
      border-bottom: 0;
    }

    .dropdown-menu a:hover { background: rgba(19, 35, 45, 0.05); }

    h1, h2, h3 {
      font-family: "Fraunces", "Georgia", serif;
      letter-spacing: 0.01em;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .page-hero {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-xl);
      padding: 48px;
      display: grid;
      gap: 12px;
      animation: fadeUp 0.8s ease-out both;
    }

    .page-hero h1 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      line-height: 1;
    }

    .page-hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 58ch;
    }

    .section {
      margin-top: 56px;
      animation: fadeUp 0.8s ease-out both;
    }

    /* Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* Thumbnail card */
    .thumb-card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(19, 35, 45, 0.08);
    }

    .thumb-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(19, 35, 45, 0.16);
    }

    .thumb-img-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: var(--deep);
      overflow: hidden;
    }

    .thumb-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .thumb-card:hover .thumb-img-wrap img {
      transform: scale(1.04);
    }

    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(19, 35, 45, 0.28);
      transition: background 0.2s ease;
    }

    .thumb-card:hover .play-btn {
      background: rgba(19, 35, 45, 0.18);
    }

    .play-btn svg {
      width: 52px;
      height: 52px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
      transition: transform 0.2s ease;
    }

    .thumb-card:hover .play-btn svg {
      transform: scale(1.1);
    }

    .thumb-meta {
      padding: 12px 16px 14px;
      display: grid;
      gap: 5px;
    }

    .thumb-title {
      font-family: "Fraunces", "Georgia", serif;
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thumb-sub {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .thumb-ep {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .thumb-date {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .thumb-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--line);
      flex-shrink: 0;
    }

    .thumb-transcript-badge {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: auto;
    }

    /* Search */
    .search-wrap {
      margin-top: 28px;
      animation: fadeUp 0.8s ease-out both;
      animation-delay: 0.05s;
    }

    .search-box {
      position: relative;
      max-width: 440px;
    }

    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--muted);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 11px 16px 11px 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(8px);
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 10px rgba(19, 35, 45, 0.06);
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search-box input::placeholder { color: var(--muted); }

    .no-results {
      display: none;
      padding: 48px 32px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
    }

    /* Empty state */
    .empty-state {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 48px 32px;
      text-align: center;
      color: var(--muted);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(13, 22, 28, 0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      position: relative;
      width: 100%;
      max-width: 900px;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.25s ease;
    }

    .modal-overlay.open .modal-box {
      transform: translateY(0) scale(1);
    }

    .modal-video {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    .modal-video iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .modal-close {
      position: absolute;
      top: -44px;
      right: 0;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: background 0.2s ease;
    }

    .modal-close:hover { background: rgba(255,255,255,0.22); }

    .modal-close svg { width: 16px; height: 16px; }

    .modal-transcript {
      margin-top: 16px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-transcript summary {
      padding: 12px 18px;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      transition: color 0.2s ease;
    }

    .modal-transcript summary::-webkit-details-marker { display: none; }

    .modal-transcript summary:hover { color: rgba(255, 255, 255, 0.9); }

    .modal-transcript summary svg {
      width: 14px;
      height: 14px;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .modal-transcript[open] summary svg { transform: rotate(90deg); }

    .transcript-body {
      padding: 0 18px 0;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.88rem;
      line-height: 1.75;
      max-height: 320px;
      overflow-y: auto;
      mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    }

    .transcript-body::after {
      content: '';
      display: block;
      height: 48px;
    }

    /* Transcript-open: side-by-side layout */
    .modal-box {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #modal-left { width: 100%; }

    .modal-box.transcript-open {
      flex-direction: row;
      align-items: flex-start;
      gap: 20px;
      max-width: 1160px;
    }

    .modal-box.transcript-open #modal-left {
      width: 44%;
      flex-shrink: 0;
    }

    .modal-box.transcript-open #modal-transcript-wrap {
      flex: 1;
      min-width: 0;
      align-self: stretch;
    }

    .modal-box.transcript-open .modal-transcript {
      margin-top: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .modal-box.transcript-open .transcript-body {
      max-height: 62vh;
      flex: 1;
    }

    @media (max-width: 700px) {
      .modal-box.transcript-open {
        flex-direction: column;
        max-width: 900px;
      }
      .modal-box.transcript-open #modal-left { width: 100%; }
    }

    /* Animations */
    .fade-delay-1 { animation-delay: 0.08s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }

    @media (max-width: 900px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 720px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        justify-content: flex-start;
        gap: 12px;
      }

      .dropdown-menu {
        position: static;
        margin-top: 8px;
        min-width: 0;
      }

      .page { padding-inline: 18px; }

      .page-hero { padding: 24px; }

      .video-grid { grid-template-columns: 1fr; gap: 14px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="brand" href="../" aria-label="Home"></a>
      <nav class="nav">
        <a href="../#experience">Experience</a>
        <details>
          <summary>Projects</summary>
          <div class="dropdown-menu">
            <a href="../compass/">Compass</a>
            <a href="../linkedin/">LinkedIn Feed Filter</a>
          </div>
        </details>
        <a href="../vlog/" class="active">Vlog</a>
        <a href="https://www.linkedin.com/in/david-h-27397413a/">Contact</a>
      </nav>
    </header>

    <main>
      <div class="page-hero">
        <p class="eyebrow">Video updates</p>
        <h1>Vlog</h1>
        <p>Building in public — automation systems, AI tools, and product development as it happens.</p>
      </div>

      <div class="search-wrap">
        <div class="search-box">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
          </svg>
          <input type="search" id="search-input" placeholder="Search titles and transcripts…" autocomplete="off" aria-label="Search videos" />
        </div>
      </div>

      <section class="section fade-delay-1" id="posts">
        <div id="posts-container"></div>
        <div class="no-results" id="no-results">No videos match your search.</div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/>
        </svg>
      </button>
      <div id="modal-left">
        <div id="modal-title" style="display:none; color:#fff; font-family:'Fraunces','Georgia',serif; font-size:1.1rem; font-weight:600; margin-bottom:10px; line-height:1.3;"></div>
        <div class="modal-video" id="modal-video"></div>
      </div>
      <div id="modal-transcript-wrap"></div>
    </div>
  </div>

  <script>
    function getVideoId(embedHtml) {
      const match = embedHtml.match(/youtube\.com\/embed\/([A-Za-z0-9_-]+)/);
      return match ? match[1] : null;
    }

    function thumbUrl(videoId) {
      return `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    }

    function buildEmbed(embedHtml) {
      return embedHtml
        .replace(/width="\d+"/, 'width="100%"')
        .replace(/height="\d+"/, 'height="100%"')
        .replace('src="//', 'src="https://') // ensure https
        .replace('src="https://www.youtube.com/embed/', 'src="https://www.youtube.com/embed/')
        .replace(/"(https:\/\/www\.youtube\.com\/embed\/[A-Za-z0-9_-]+)"/, (_, url) => `"${url}?autoplay=1"`);
    }

    // Modal logic
    const modal = document.getElementById('modal');
    const modalVideo = document.getElementById('modal-video');
    const modalTranscriptWrap = document.getElementById('modal-transcript-wrap');

    function openModal(embedHtml, transcript, title) {
      const modalTitle = document.getElementById('modal-title');
      if (title) {
        modalTitle.textContent = title;
        modalTitle.style.display = 'block';
      } else {
        modalTitle.style.display = 'none';
      }
      modalVideo.innerHTML = buildEmbed(embedHtml);
      if (transcript) {
        modalTranscriptWrap.innerHTML = `
          <details class="modal-transcript">
            <summary>
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="5,2 10,7 5,12"/>
              </svg>
              Transcript
            </summary>
            <div class="transcript-body">${transcript.replace(/</g, '&lt;').replace(/\n/g, '<br><br>')}</div>
          </details>`;
        // Switch to side-by-side layout when transcript is open
        const details = modalTranscriptWrap.querySelector('details');
        const modalBox = document.querySelector('.modal-box');
        details.addEventListener('toggle', () => {
          modalBox.classList.toggle('transcript-open', details.open);
        });
      } else {
        modalTranscriptWrap.innerHTML = '';
      }
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.querySelector('.modal-box').classList.remove('transcript-open');
      document.body.style.overflow = '';
      setTimeout(() => { modalVideo.innerHTML = ''; }, 250);
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);

    modal.addEventListener('click', e => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // Load posts
    fetch('posts.json')
      .then(r => r.json())
      .then(posts => {
        const container = document.getElementById('posts-container');

        if (!posts.length) {
          container.innerHTML = '<div class="empty-state">No posts yet. Check back soon.</div>';
          return;
        }

        const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));

        const cards = sorted.map((post, i) => {
          const videoId = getVideoId(post.embedHtml);
          const date = new Date(post.date + 'T00:00:00');
          const label = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          const ep = sorted.length - i;
          const embedEscaped = post.embedHtml.replace(/"/g, '&quot;');
          const transcriptEscaped = (post.transcript || '').replace(/"/g, '&quot;');

          const title = post.title || '';
          const titleEscaped = title.replace(/"/g, '&quot;');
          const transcriptBadge = post.transcript ? '<span class="thumb-transcript-badge">Transcript</span>' : '';

          return `
            <article class="thumb-card" role="button" tabindex="0" data-embed="${embedEscaped}" data-transcript="${transcriptEscaped}" data-title="${titleEscaped}" aria-label="${title || `Episode ${ep}`}">
              <div class="thumb-img-wrap">
                <img src="${thumbUrl(videoId)}" alt="${title || `Episode ${ep}`}" loading="lazy" />
                <div class="play-btn" aria-hidden="true">
                  <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="26" cy="26" r="26" fill="rgba(255,255,255,0.18)"/>
                    <polygon points="21,17 38,26 21,35" fill="white"/>
                  </svg>
                </div>
              </div>
              <div class="thumb-meta">
                ${title ? `<div class="thumb-title">${title}</div>` : ''}
                <div class="thumb-sub">
                  <span class="thumb-ep">Ep. ${ep}</span>
                  <span class="thumb-dot"></span>
                  <span class="thumb-date">${label}</span>
                  ${transcriptBadge}
                </div>
              </div>
            </article>
          `;
        }).join('');

        container.innerHTML = `<div class="video-grid">${cards}</div>`;

        // Search filter
        const searchInput = document.getElementById('search-input');
        const noResults = document.getElementById('no-results');

        function filterCards(query) {
          const q = query.toLowerCase().trim();
          const cards = container.querySelectorAll('.thumb-card');
          let visible = 0;
          cards.forEach(card => {
            const titleMatch = card.dataset.title.toLowerCase().includes(q);
            const transcriptMatch = card.dataset.transcript.toLowerCase().includes(q);
            const show = !q || titleMatch || transcriptMatch;
            card.style.display = show ? '' : 'none';
            if (show) visible++;
          });
          noResults.style.display = visible === 0 && q ? 'block' : 'none';
        }

        searchInput.addEventListener('input', e => filterCards(e.target.value));

        // Attach click handlers
        container.querySelectorAll('.thumb-card').forEach(card => {
          const open = () => openModal(
            card.dataset.embed.replace(/&quot;/g, '"'),
            card.dataset.transcript.replace(/&quot;/g, '"') || null,
            card.dataset.title.replace(/&quot;/g, '"') || null
          );
          card.addEventListener('click', open);
          card.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
          });
        });
      })
      .catch(() => {
        document.getElementById('posts-container').innerHTML =
          '<div class="empty-state">Could not load posts.</div>';
      });
  </script>
</body>
</html>
