  <style>
    :root {
      --bg: #edf1f4;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: #ffffff;
      --ink: #13232d;
      --muted: #5a6a74;
      --line: rgba(19, 35, 45, 0.12);
      --accent: #8b5e3c;
      --accent-soft: rgba(139, 94, 60, 0.12);
      --deep: #1d3442;
      --shadow: 0 24px 70px rgba(19, 35, 45, 0.12);
      --radius-xl: 34px;
      --radius-lg: 22px;
      --radius-sm: 14px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      line-height: 1.65;
      background:
        radial-gradient(circle at top left, rgba(139, 94, 60, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(29, 52, 66, 0.12), transparent 30%),
        linear-gradient(180deg, #f6f8fa 0%, var(--bg) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      z-index: -1;
      border-radius: 50%;
      filter: blur(6px);
      opacity: 0.9;
    }

    body::before {
      width: 380px;
      height: 380px;
      top: -140px;
      right: -120px;
      background: radial-gradient(circle at 35% 35%, rgba(139, 94, 60, 0.18), transparent 68%);
    }

    body::after {
      width: 420px;
      height: 420px;
      left: -160px;
      bottom: -180px;
      background: radial-gradient(circle at 50% 50%, rgba(29, 52, 66, 0.14), transparent 72%);
    }

    a { color: inherit; text-decoration: none; }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 24px 96px;
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 8px 0 32px;
    }

    .brand {
      display: block;
      min-width: 220px;
      min-height: 1px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: flex-end;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav a,
    .nav summary {
      padding-bottom: 4px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      list-style: none;
    }

    .nav a:hover,
    .nav summary:hover,
    .nav details[open] summary {
      color: var(--ink);
      border-color: var(--accent);
    }

    .nav a.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    .nav summary::-webkit-details-marker { display: none; }

    .nav details { position: relative; }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      min-width: 220px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(19, 35, 45, 0.14);
      display: grid;
      gap: 4px;
      z-index: 10;
    }

    .dropdown-menu a {
      padding: 10px 12px;
      border-radius: 10px;
      border-bottom: 0;
    }

    .dropdown-menu a:hover { background: rgba(19, 35, 45, 0.05); }

    h1, h2, h3 {
      font-family: "Fraunces", "Georgia", serif;
      letter-spacing: 0.01em;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* Page hero (index only) */
    .page-hero {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-xl);
      padding: 48px;
      display: grid;
      gap: 12px;
      animation: fadeUp 0.8s ease-out both;
    }

    .page-hero h1 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      line-height: 1;
    }

    .page-hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 58ch;
    }

    .section {
      margin-top: 56px;
      animation: fadeUp 0.8s ease-out both;
    }

    /* Search */
    .search-wrap {
      margin-top: 28px;
      animation: fadeUp 0.8s ease-out both;
      animation-delay: 0.05s;
    }

    .search-box {
      position: relative;
      max-width: 440px;
    }

    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--muted);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 11px 16px 11px 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(8px);
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 10px rgba(19, 35, 45, 0.06);
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search-box input::placeholder { color: var(--muted); }

    .no-results {
      display: none;
      margin-top: 12px;
      padding: 48px 32px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
    }

    .empty-state {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 48px 32px;
      text-align: center;
      color: var(--muted);
    }

    /* ── INDEX: Post list ── */
    .post-list {
      display: grid;
      gap: 12px;
    }

    .post-card {
      display: flex;
      align-items: center;
      gap: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 4px 16px rgba(19, 35, 45, 0.06);
    }

    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(19, 35, 45, 0.12);
      border-color: rgba(139, 94, 60, 0.25);
    }

    .post-card-body {
      flex: 1;
      min-width: 0;
    }

    .post-card-thumb {
      flex-shrink: 0;
      width: 150px;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--deep);
    }

    .post-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .post-card:hover .post-card-thumb img {
      transform: scale(1.05);
    }

    .post-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .post-ep {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .post-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
      flex-shrink: 0;
    }

    .post-date {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .article-badge {
      margin-left: auto;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 4px;
      padding: 2px 6px;
    }

    .post-card-title {
      font-family: "Fraunces", "Georgia", serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 8px;
      line-height: 1.25;
      letter-spacing: 0.01em;
    }

    .post-card-excerpt {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
    }

    /* ── POST DETAIL ── */
    .post-detail {
      max-width: 760px;
      margin: 0 auto;
      animation: fadeUp 0.6s ease-out both;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 36px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      transition: color 0.2s ease;
    }

    .back-link:hover { color: var(--accent); }

    .post-detail-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .post-detail-title {
      font-family: "Fraunces", "Georgia", serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 600;
      line-height: 1.15;
      margin: 0 0 32px;
      color: var(--ink);
    }

    .post-video-wrap {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow);
      margin-bottom: 44px;
    }

    .post-video-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* Prose (polished article body) */
    .prose {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--ink);
    }

    .prose h2 {
      font-family: "Fraunces", "Georgia", serif;
      font-size: 1.35rem;
      font-weight: 600;
      margin: 2.5rem 0 0.75rem;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .prose p {
      margin: 0 0 1.25rem;
    }

    .prose p:last-child { margin-bottom: 0; }

    /* Transcript-only view */
    .transcript-text {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .transcript-text p {
      margin: 0 0 1.2rem;
    }

    .transcript-text p:last-child { margin-bottom: 0; }

    /* Raw transcript toggle (article posts only) */
    .transcript-toggle {
      margin-top: 52px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .transcript-toggle summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      list-style: none;
      user-select: none;
      transition: color 0.2s ease;
    }

    .transcript-toggle summary::-webkit-details-marker { display: none; }
    .transcript-toggle summary:hover { color: var(--accent); }

    .transcript-toggle summary svg {
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .transcript-toggle[open] summary svg { transform: rotate(90deg); }

    .transcript-toggle-body {
      margin-top: 20px;
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--muted);
    }

    /* Animations */
    .fade-delay-1 { animation-delay: 0.08s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }

    @media (max-width: 720px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        justify-content: flex-start;
        gap: 12px;
      }

      .dropdown-menu {
        position: static;
        margin-top: 8px;
        min-width: 0;
      }

      .page { padding-inline: 18px; }
      .page-hero { padding: 24px; }
      .post-card { padding: 16px 18px; gap: 16px; }
      .post-card-thumb { width: 104px; }
      .post-card-title { font-size: 1.15rem; }
      .post-detail-title { font-size: 1.7rem; }
    }
  </style>

<body>
  <div class="page">
    <header class="site-header">
      <a class="brand" href="../" aria-label="Home"></a>
      <nav class="nav">
        <a href="../#experience">Experience</a>
        <details>
          <summary>Projects</summary>
          <div class="dropdown-menu">
            <a href="../compass/">Compass</a>
            <a href="../linkedin/">LinkedIn Feed Filter</a>
          </div>
        </details>
        <a href="../vlog/" class="active">Vlog</a>
        <a href="https://www.linkedin.com/in/david-h-27397413a/">Contact</a>
      </nav>
    </header>
    <main id="main-content"></main>
  </div>

  <script>
    function getVideoId(embedHtml) {
      const m = embedHtml.match(/youtube\.com\/embed\/([A-Za-z0-9_-]+)/);
      return m ? m[1] : null;
    }

    function buildEmbed(embedHtml) {
      return embedHtml
        .replace(/width="\d+"/, 'width="100%"')
        .replace(/height="\d+"/, 'height="100%"')
        .replace('src="//', 'src="https://');
    }

    function formatDate(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function transcriptToParas(text) {
      const sentences = text.match(/[^.!?]+[.!?]+(?:\s|$)/g) || [text];
      const paras = [];
      for (let i = 0; i < sentences.length; i += 4) {
        paras.push(sentences.slice(i, i + 4).join('').trim());
      }
      return paras.map(p => `<p>${esc(p)}</p>`).join('');
    }

    let postsData = [];
    let articlesData = {};
    let currentSearch = '';

    function showIndex() {
      window.scrollTo(0, 0);
      const total = postsData.length;

      const cards = postsData.map((post, i) => {
        const videoId = getVideoId(post.embedHtml);
        const enrich = articlesData[videoId] || {};
        const ep = total - i;
        const hasArticle = !!enrich.article;
        const excerpt = enrich.excerpt || '';

        return `
          <article class="post-card" role="button" tabindex="0"
              data-id="${esc(videoId)}"
              aria-label="${esc(post.title || `Episode ${ep}`)}">
            <div class="post-card-body">
              <div class="post-card-meta">
                <span class="post-ep">Ep. ${ep}</span>
                <span class="post-dot"></span>
                <span class="post-date">${formatDate(post.date)}</span>
                ${hasArticle ? '<span class="article-badge">Article</span>' : ''}
              </div>
              <h2 class="post-card-title">${esc(post.title || `Episode ${ep}`)}</h2>
              ${excerpt ? `<p class="post-card-excerpt">${esc(excerpt)}</p>` : ''}
            </div>
            <div class="post-card-thumb">
              <img src="https://i.ytimg.com/vi/${esc(videoId)}/mqdefault.jpg" alt="" loading="lazy" />
            </div>
          </article>`;
      }).join('');

      document.getElementById('main-content').innerHTML = `
        <div class="page-hero">
          <p class="eyebrow">Video updates</p>
          <h1>Vlog</h1>
          <p>Thinking out loud about AI, automation, and life.</p>
        </div>
        <div class="search-wrap">
          <div class="search-box">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
            </svg>
            <input type="search" id="search-input" placeholder="Search posts…" autocomplete="off" aria-label="Search posts" />
          </div>
        </div>
        <section class="section fade-delay-1">
          ${total ? `<div class="post-list" id="post-list">${cards}</div>` : '<div class="empty-state">No posts yet. Check back soon.</div>'}
          <div class="no-results" id="no-results">No posts match your search.</div>
        </section>`;

      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.value = currentSearch;
        if (currentSearch) filterCards(currentSearch);
        searchInput.addEventListener('input', e => {
          currentSearch = e.target.value;
          filterCards(currentSearch);
        });
      }

      const list = document.getElementById('post-list');
      if (list) {
        list.querySelectorAll('.post-card').forEach(card => {
          const go = () => { window.location.hash = card.dataset.id; };
          card.addEventListener('click', go);
          card.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
          });
        });
      }
    }

    function filterCards(query) {
      const q = query.toLowerCase().trim();
      const list = document.getElementById('post-list');
      const noResults = document.getElementById('no-results');
      if (!list) return;
      let visible = 0;
      list.querySelectorAll('.post-card').forEach(card => {
        const id = card.dataset.id;
        const post = postsData.find(p => getVideoId(p.embedHtml) === id) || {};
        const enrich = articlesData[id] || {};
        const haystack = [post.title, post.transcript, enrich.excerpt].filter(Boolean).join(' ').toLowerCase();
        const show = !q || haystack.includes(q);
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      if (noResults) {
        noResults.style.display = visible === 0 && q ? 'block' : 'none';
      }
    }

    function showPost(post) {
      window.scrollTo(0, 0);
      const videoId = getVideoId(post.embedHtml);
      const enrich = articlesData[videoId] || {};
      const total = postsData.length;
      const idx = postsData.findIndex(p => getVideoId(p.embedHtml) === videoId);
      const ep = total - idx;
      const hasArticle = !!enrich.article;
      const hasTranscript = !!post.transcript;

      let bodyHtml = '';
      if (hasArticle) {
        bodyHtml = `<div class="prose">${enrich.article}</div>`;
        if (hasTranscript) {
          bodyHtml += `
            <details class="transcript-toggle">
              <summary>
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
                  <polyline points="5,2 10,7 5,12"/>
                </svg>
                View raw transcript
              </summary>
              <div class="transcript-toggle-body">${esc(post.transcript)}</div>
            </details>`;
        }
      } else if (hasTranscript) {
        bodyHtml = `<div class="transcript-text">${transcriptToParas(post.transcript)}</div>`;
      }

      document.getElementById('main-content').innerHTML = `
        <div class="post-detail">
          <button class="back-link" id="back-btn">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
              <polyline points="9,2 4,7 9,12"/>
            </svg>
            All posts
          </button>
          <div class="post-detail-meta">
            <span class="post-ep">Ep. ${ep}</span>
            <span class="post-dot"></span>
            <time datetime="${esc(post.date)}">${formatDate(post.date)}</time>
          </div>
          <h1 class="post-detail-title">${esc(post.title || `Episode ${ep}`)}</h1>
          <div class="post-video-wrap">${buildEmbed(post.embedHtml)}</div>
          ${bodyHtml}
        </div>`;

      document.getElementById('back-btn').addEventListener('click', () => {
        window.location.hash = '';
      });
    }

    function route() {
      const videoId = window.location.hash.slice(1);
      if (videoId) {
        const post = postsData.find(p => getVideoId(p.embedHtml) === videoId);
        if (post) { showPost(post); return; }
      }
      showIndex();
    }

    Promise.all([
      fetch('posts.json').then(r => r.json()),
      fetch('articles.json').then(r => r.json()).catch(() => ({}))
    ]).then(([posts, articles]) => {
      postsData = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
      articlesData = articles;
      route();
      window.addEventListener('hashchange', route);
    }).catch(() => {
      document.getElementById('main-content').innerHTML =
        '<div class="empty-state">Could not load posts.</div>';
    });
  </script>
</body>
</html>
